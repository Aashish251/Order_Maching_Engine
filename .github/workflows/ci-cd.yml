name: OME CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aashish251/order_maching_engine/ome

jobs:

  # ── Job 1: Build and Test ─────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ome_db_test
          POSTGRES_USER: ome_user
          POSTGRES_PASSWORD: ome_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -B
        working-directory: ome

      - name: Run Unit Tests
        run: mvn test -Dtest=MatchingEngineTest -B
        working-directory: ome

      - name: Run All Tests
        run: mvn verify -B
        working-directory: ome
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ome_db_test
          SPRING_DATASOURCE_USERNAME: ome_user
          SPRING_DATASOURCE_PASSWORD: ome_pass
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ome/target/surefire-reports/

  # ── Job 2: Docker Build and Push ─────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test         # only runs if tests pass
    if: github.ref == 'refs/heads/main'   # only on main branch

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ome
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Kubernetes ───────────────────────────
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Update image tag in deployment
        run: |
          sed -i "s|ghcr.io/YOUR_GITHUB_USERNAME/ome:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}|g" \
            k8s/deployment.yml

      - name: Apply K8s manifests
        run: |
          export KUBECONFIG=kubeconfig
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/secret.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/hpa.yml

      - name: Wait for rollout
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/ome-app \
            --namespace=ome \
            --timeout=300s

      - name: Smoke test
        run: |
          export KUBECONFIG=kubeconfig
          POD=$(kubectl get pods -n ome -l app=ome-app \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n ome $POD -- \
            wget -q --spider http://localhost:8080/actuator/health

  # ── Job 4: Notify on Failure ──────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build, deploy]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "Pipeline failed on branch ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          # In production: send to Slack/Teams/PagerDuty
