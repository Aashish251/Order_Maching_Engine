apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ome-hpa
  namespace: ome
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ome-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # scale up when memory > 80%