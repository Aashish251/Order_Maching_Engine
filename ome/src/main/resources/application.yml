spring:
  application:
    name: order-matching-engine

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/ome_db
    username: ome_user
    password: ome_pass
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: OME-HikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Flyway ────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Redis ─────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      password: ome_redis_pass
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: ome-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.project.*"

  # ── Security (disable default for now) ───────────────────
  security:
    user:
      name: admin
      password: admin

# ── Server ────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /

# ── Actuator ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ── App custom config ──────────────────────────────────────
app:
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
    expiration-ms: 86400000   # 24 hours
  matching-engine:
    instruments:
      - BTC-USD
      - ETH-USD
      - SOL-USD
  kafka:
    topics:
      order-events: order.events
      trade-executed: trade.executed
      order-book-update: orderbook.update

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    com.project: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"